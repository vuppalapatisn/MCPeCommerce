services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecom_mcp
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom_password_change_me
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom -d ecom_mcp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ecom_mcp
      SPRING_DATASOURCE_USERNAME: ecom
      SPRING_DATASOURCE_PASSWORD: ecom_password_change_me
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - appdata:/app/data

volumes:
  pgdata:
  appdata:
